name: Handy
options:
  bundleIdPrefix: com.handy
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

# packages:
#   WhisperKit:
#     url: https://github.com/argmaxinc/WhisperKit
#     from: "0.9.0"
#   Supabase:
#     url: https://github.com/supabase/supabase-swift
#     from: "2.0.0"

targets:
  Handy:
    type: application
    platform: macOS
    sources:
      - path: Handy
    settings:
      base:
        INFOPLIST_FILE: Handy/Info.plist
        CODE_SIGN_ENTITLEMENTS: Handy/Handy.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.handy.app
        PRODUCT_NAME: Handy
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: false
    # dependencies:
    #   - package: WhisperKit
    #   - package: Supabase

  HandyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HandyTests
    dependencies:
      - target: Handy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.handy.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Handy.app/Contents/MacOS/Handy"
        GENERATE_INFOPLIST_FILE: true
