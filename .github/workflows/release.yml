name: Build & Release Handy

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.1.0

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: brew install portaudio librsvg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate app icon
        run: |
          mkdir -p Handy.iconset
          SVG="assets/app-icon.svg"
          if [ ! -f "$SVG" ]; then
            echo "Warning: app-icon.svg not found, using placeholder"
            # Create a simple placeholder SVG
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"><rect width="1024" height="1024" rx="200" fill="#007AFF"/><text x="512" y="600" font-size="500" fill="white" text-anchor="middle" font-family="SF Pro">H</text></svg>' > "$SVG"
          fi
          for spec in "16x16:16" "16x16@2x:32" "32x32:32" "32x32@2x:64" "128x128:128" "128x128@2x:256" "256x256:256" "256x256@2x:512" "512x512:512" "512x512@2x:1024"; do
            name="${spec%%:*}"
            size="${spec##*:}"
            rsvg-convert -w "$size" -h "$size" "$SVG" -o "Handy.iconset/icon_${name}.png"
          done
          iconutil -c icns Handy.iconset
          rm -rf Handy.iconset

      - name: Build .app bundle
        run: python3 setup_app.py py2app

      - name: Create DMG
        run: |
          APP_PATH="dist/Handy.app"
          DMG_TEMP="dist/Handy_temp.dmg"
          DMG_PATH="dist/Handy.dmg"

          hdiutil create -size 200m -fs HFS+ -volname "Handy" "$DMG_TEMP"
          MOUNT_DIR=$(hdiutil attach "$DMG_TEMP" -readwrite | grep "/Volumes/" | awk '{print $NF}')
          cp -R "$APP_PATH" "$MOUNT_DIR/"
          ln -s /Applications "$MOUNT_DIR/Applications"
          sync
          sleep 2
          hdiutil detach "$MOUNT_DIR"
          hdiutil convert "$DMG_TEMP" -format UDZO -o "$DMG_PATH"
          rm -f "$DMG_TEMP"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Handy v${{ steps.version.outputs.version }}
          body: |
            ## Handy v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `Handy.dmg` below
            2. Open the DMG and drag Handy to your Applications folder
            3. Launch Handy from Applications
            4. On first launch, right-click → Open to bypass Gatekeeper

            ### Requirements
            - macOS 12.0 or later
            - Microphone permission
            - Accessibility permission (for text pasting)
          files: dist/Handy.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest_version.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > latest_version.json << EOF
          {
            "version": "$VERSION",
            "download_url": "https://github.com/${{ github.repository }}/releases/latest/download/Handy.dmg",
            "notes": "Handy v$VERSION"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_version.json
          git commit -m "Update latest_version.json to v$VERSION" || true
          git push origin HEAD:main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
